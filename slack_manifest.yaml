display_information:
  name: SpecBot
  description: Answers spec questions and turns brainstorm transcripts into proposals
  background_color: "#1a1a2e"

features:
  bot_user:
    display_name: SpecBot
    always_online: true
  slash_commands:
    - command: /specbot
      url: https://YOUR_DOMAIN/slack/commands
      description: Ask a question about a feature spec
      usage_hint: "[your question about the spec]"
      should_escape: false

oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - channels:history
      - channels:read
      - chat:write
      - commands
      - groups:history
      - im:history

settings:
  event_subscriptions:
    request_url: https://YOUR_DOMAIN/slack/events
    bot_events:
      - app_mention
      - message.channels
      - message.groups
  interactivity:
    is_enabled: true
    request_url: https://YOUR_DOMAIN/slack/interactions
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
